services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "128mb"
    devices:
      - /dev/dri:/dev/dri # Intel iGPU для апаратного прискорення
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - /mnt/files/docker/frigate/media:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 512mb
    ports:
      - "8971:8971"       # Захищений порт з авторизацією (новий веб-інтерфейс)
      - "8554:8554"       # RTSP ретрансляція
      - "8555:8555/tcp"   # WebRTC (для швидкого відео в браузері)
      - "8555:8555/udp"   # WebRTC (для швидкого відео в браузері)